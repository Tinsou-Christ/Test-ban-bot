services:
  - type: worker
    name: harassment-report-bot
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        value: "8294554523"
      - key: DAILY_LIMIT
        value: "10"
